<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历预览</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f7fb; color: #111; }
        .topbar { height: 56px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; background: #fff; border-bottom: 1px solid #eaeaea; position: sticky; top: 0; z-index: 10; }
        .title { font-size: 15px; font-weight: 600; }
        .back { color: #333; text-decoration: none; font-size: 14px; }
        .fallback { padding: 12px 20px; font-size: 13px; color: #666; background: #fff; border-bottom: 1px solid #eaeaea; }
        .fallback a { color: #000; }
        .status { padding: 12px 20px; color: #555; font-size: 13px; }
        .pdf-container { width: min(960px, calc(100vw - 24px)); margin: 12px auto 24px; display: flex; flex-direction: column; gap: 12px; }
        .page { background: #fff; border: 1px solid #eaeaea; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04); }
        .page canvas { width: 100%; height: auto; display: block; }
        .error { color: #b42318; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="title">简历预览</div>
        <a class="back" href="./index.html">返回首页</a>
    </div>
    <div class="fallback">如浏览器未显示预览，可<a href="./简历.pdf" target="_blank" rel="noopener noreferrer">点击这里打开 PDF</a>。</div>
    <div id="status" class="status">正在加载 PDF...</div>
    <main id="pdfContainer" class="pdf-container"></main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        const pdfUrl = "./简历.pdf";
        const statusEl = document.getElementById("status");
        const container = document.getElementById("pdfContainer");
        let pdfDoc = null;
        let renderToken = 0;

        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        async function renderAllPages() {
            if (!pdfDoc) return;
            const currentToken = ++renderToken;
            container.innerHTML = "";

            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum += 1) {
                if (currentToken !== renderToken) return;

                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 1 });
                const containerWidth = container.clientWidth || 900;
                const scale = Math.max(containerWidth / viewport.width, 0.5);
                const scaledViewport = page.getViewport({ scale });

                const pageWrapper = document.createElement("section");
                pageWrapper.className = "page";

                const canvas = document.createElement("canvas");
                const context = canvas.getContext("2d");
                canvas.width = Math.floor(scaledViewport.width);
                canvas.height = Math.floor(scaledViewport.height);
                pageWrapper.appendChild(canvas);
                container.appendChild(pageWrapper);

                await page.render({ canvasContext: context, viewport: scaledViewport }).promise;
            }
        }

        async function init() {
            try {
                const task = pdfjsLib.getDocument(pdfUrl);
                pdfDoc = await task.promise;
                statusEl.textContent = `共 ${pdfDoc.numPages} 页，可在线预览`;
                await renderAllPages();
            } catch (error) {
                statusEl.classList.add("error");
                statusEl.innerHTML = 'PDF 加载失败，请<a href="./简历.pdf" target="_blank" rel="noopener noreferrer">点击这里直接打开</a>。';
                console.error(error);
            }
        }

        let resizeTimer = null;
        window.addEventListener("resize", () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                renderAllPages();
            }, 150);
        });

        init();
    </script>
</body>
</html>
